name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: sk-placeholder
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/testdb
      CHROMA_PERSIST_DIR: chroma_db
      LANGCHAIN_TRACING_V2: "false"
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: poetry run pytest tests/ -v

  # ── 2. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

  # ── 3. Docker build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg OPENAI_API_KEY=placeholder \
            -t bayer-ai:ci \
            .

  # ── 4. Deploy to Azure Container Apps ───────────────────────────────────────
  # Only runs on pushes to main — pull requests stop at docker-build.
  # Uses OIDC federation: GitHub receives a short-lived token from Azure AD,
  # so no service principal password or long-lived credential is ever stored.
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [docker-build]
    

    # Required for OIDC: the workflow must request id-token write permission
    # so GitHub can mint the token that Azure AD will validate.
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC — no stored password)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        # Tag with the commit SHA so every deployment is traceable back to
        # a specific commit. The 'latest' tag is not used in production to
        # prevent accidental rollbacks to an older cached image.
        run: |
          az acr login --name bayerairegistry
          docker build -t bayerairegistry.azurecr.io/bayer-ai:${{ github.sha }} .
          docker push bayerairegistry.azurecr.io/bayer-ai:${{ github.sha }}

      - name: Run database migrations
        # Update the job to the exact image being deployed, then start it.
        # The command (alembic upgrade head) is set on the job definition —
        # not passed at runtime — so it is always in sync with the job config.
        # The job must succeed before the container app update runs. If migration
        # fails the workflow exits here and the running app is left untouched.
        run: |
          az containerapp job update \
            --name bayer-ai-migrate \
            --resource-group bayer-ai-rg \
            --image bayerairegistry.azurecr.io/bayer-ai:${{ github.sha }} \
            --command "alembic" "upgrade" "head"

          EXECUTION_NAME=$(az containerapp job start \
            --name bayer-ai-migrate \
            --resource-group bayer-ai-rg \
            --query name -o tsv)
          echo "Execution: $EXECUTION_NAME"

          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution show \
              --name bayer-ai-migrate \
              --resource-group bayer-ai-rg \
              --job-execution-name "$EXECUTION_NAME" \
              --query properties.status -o tsv)
            echo "Migration status: $STATUS"
            [ "$STATUS" = "Succeeded" ] && break
            [ "$STATUS" = "Failed"    ] && exit 1
            sleep 10
          done

      - name: Deploy to Container Apps
        # Updating the image reference triggers a rolling restart with zero
        # downtime. Container Apps keeps the previous revision alive until
        # the new one passes its health checks.
        run: |
          az containerapp update \
            --name bayer-ai-app \
            --resource-group bayer-ai-rg \
            --image bayerairegistry.azurecr.io/bayer-ai:${{ github.sha }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4

      - name: Deploy Azure Function (ingest pipeline)
        # Uses func core tools for reliable deployment to Linux consumption plan.
        # Azure/functions-action sets WEBSITE_RUN_FROM_PACKAGE which conflicts
        # with SCM-based deployments on Linux — func publish avoids this entirely.
        run: |
          cd functions/ingest
          func azure functionapp publish bayer-ai-ingest-fn --python

      - name: Verify deployment health
        # Wait for the new revision to become active, then hit the health
        # endpoint. The step fails the workflow if the app is not responding,
        # giving a clear signal before the run is marked green.
        run: |
          FQDN=$(az containerapp show \
            --name bayer-ai-app \
            --resource-group bayer-ai-rg \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "App URL: https://${FQDN}"
          sleep 15
          curl --fail --silent --show-error "https://${FQDN}/api/v1/health"
